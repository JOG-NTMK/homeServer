---
- name: Deploy TrueNAS Custom App via WebSocket API
  hosts: localhost
  gather_facts: no

  vars_files:
    - vars/truenas.yml

  vars:
    app_name: "mainserver"
    docker_compose_file: "mainServer.yaml"
    deploy_script: "/tmp/truenas_deploy.py"

  tasks:
    - name: Validate TrueNAS API key is set
      fail:
        msg: "TRUENAS_API_KEY not configured in vars/truenas.yml"
      when: truenas_api_key is not defined or truenas_api_key == ""

    - name: Ensure truenas-api-client is installed
      pip:
        name: "git+https://github.com/truenas/api_client.git"
        state: present
      become: no

    - name: Read docker-compose file
      set_fact:
        compose_content: "{{ lookup('file', docker_compose_file) }}"

    - name: Build env var substitution map
      set_fact:
        env_vars:
          DATA_LOCATION: "/mnt/Main/Media"
          CACHE_LOCATION: "/mnt/cachepool/tmp"
          DB_PASSWORD: "{{ db_password }}"
          DB_USERNAME: "postgres"
          DB_DATABASE_NAME: "immich"
          DB_HOSTNAME: "immich_postgres"
          REDIS_HOSTNAME: "immich_redis"
          UID: "1000"
          GID: "1000"

    - name: Substitute environment variables into compose content
      set_fact:
        compose_with_env: >-
          {{ compose_content
            | regex_replace('\$\{DATA_LOCATION\}',   env_vars.DATA_LOCATION)
            | regex_replace('\$\{CACHE_LOCATION\}',  env_vars.CACHE_LOCATION)
            | regex_replace('\$\{DB_PASSWORD\}',     env_vars.DB_PASSWORD)
            | regex_replace('\$\{DB_USERNAME\}',     env_vars.DB_USERNAME)
            | regex_replace('\$\{DB_DATABASE_NAME\}',env_vars.DB_DATABASE_NAME)
            | regex_replace('\$\{DB_HOSTNAME\}',     env_vars.DB_HOSTNAME)
            | regex_replace('\$\{REDIS_HOSTNAME\}',  env_vars.REDIS_HOSTNAME)
            | regex_replace('\$\{UID\}',             env_vars.UID)
            | regex_replace('\$\{GID\}',             env_vars.GID) }}

    - name: Write deploy script to disk
      copy:
        dest: "{{ deploy_script }}"
        mode: "0700"
        content: |
          #!/usr/bin/env python3
          import sys, json, yaml
          from truenas_api_client import Client

          TRUENAS_HOST = sys.argv[1]
          API_KEY      = sys.argv[2]
          APP_NAME     = sys.argv[3]
          COMPOSE_YAML = sys.argv[4]

          compose = yaml.safe_load(COMPOSE_YAML)

          try:
              with Client(f"wss://{TRUENAS_HOST}/api/current", verify_ssl=False) as c:
                  c.call("auth.login_with_api_key", API_KEY)

                  apps = c.call("app.query")
                  app_exists = any(a["name"] == APP_NAME for a in apps)

                  payload = {"custom_compose_config": compose}

                  if app_exists:
                      print(f"App '{APP_NAME}' exists — updating...")
                      job_id = c.call("app.update", APP_NAME, payload)
                  else:
                      print(f"App '{APP_NAME}' not found — creating...")
                      job_id = c.call("app.create", {
                          "app_name": APP_NAME,
                          "custom_app": True,
                          **payload
                      })

                  result = c.call("core.job_wait", job_id)
                  print(json.dumps({"status": "success", "result": result}, default=str))

          except Exception as e:
              print(json.dumps({"status": "error", "message": str(e)}), file=sys.stderr)
              sys.exit(1)

    - name: Run deploy script
      command: >
        python3 {{ deploy_script }}
        "{{ truenas_host }}"
        "{{ truenas_api_key }}"
        "{{ app_name }}"
        "{{ compose_with_env }}"
      register: deploy_result
      no_log: false  # suppress secrets from console output

    - name: Parse deploy result
      set_fact:
        deploy_output: "{{ deploy_result.stdout_lines[-1] | from_json }}"

    - name: Display deploy result
      debug:
        msg: |
          Status: {{ deploy_output.status }}
          Result: {{ deploy_output.result | default('N/A') }}

    - name: Fail if deploy reported an error
      fail:
        msg: "Deploy failed: {{ deploy_output.message }}"
      when: deploy_output.status == "error"

    - name: Clean up deploy script
      file:
        path: "{{ deploy_script }}"
        state: absent

    - name: Display access URLs
      debug:
        msg: |
          Services available at:
          - Jellyfin:  http://{{ truenas_host }}:8096
          - Radarr:    http://{{ truenas_host }}:7878
          - Sonarr:    http://{{ truenas_host }}:8989
          - SABnzbd:   http://{{ truenas_host }}:6789
          - Ombi:      http://{{ truenas_host }}:3579
          - Immich:    http://{{ truenas_host }}:2283