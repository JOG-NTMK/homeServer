networks:
  media_network:
    driver: bridge
services:
  jellyfin:
    image: linuxserver/jellyfin
    container_name: jellyfin
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - "44"   # video
      - "107"  # render
    environment:
      TZ: Europe/Dublin
    networks:
      - media_network
    ports:
      - '8096:8096'
    restart: unless-stopped
    volumes:
      - ${DATA_LOCATION}/jellyfin/config:/config
      - ${DATA_LOCATION}/jellyfin/media:/media
      - ${CACHE_LOCATION}/jellyfin/transcodes:/transcodes
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
  radarr:
    container_name: radarr
    depends_on:
      - sabnzbd
    environment:
      TZ: Europe/Dublin
    image: linuxserver/radarr
    networks:
      - media_network
    ports:
      - '7878:7878'
    restart: unless-stopped
    volumes:
      - ${DATA_LOCATION}/radarr/config:/config
      - ${CACHE_LOCATION}/sabnzbd/downloads:/downloads
      - ${DATA_LOCATION}/jellyfin/media/Movies:/movies
  sabnzbd:
    container_name: sabnzbd
    environment:
      TZ: Europe/Dublin
    image: lscr.io/linuxserver/sabnzbd:latest
    networks:
      - media_network
    ports:
      - '6789:8080'
    restart: unless-stopped
    volumes:
      - ${DATA_LOCATION}/sabnzbd/config:/config
      - ${CACHE_LOCATION}/sabnzbd/downloads:/downloads
      - ${CACHE_LOCATION}/sabnzbd/incomplete:/incomplete-downloads
  sonarr:
    container_name: sonarr
    depends_on:
      - sabnzbd
    environment:
      TZ: Europe/Dublin
    image: linuxserver/sonarr
    networks:
      - media_network
    ports:
      - '8989:8989'
    restart: unless-stopped
    volumes:
      - ${DATA_LOCATION}/sonarr/config:/config
      - ${CACHE_LOCATION}/sabnzbd/downloads:/downloads
      - ${DATA_LOCATION}/jellyfin/media/Shows:/tv
  ombi:
    container_name: ombi
    environment:
      TZ: Europe/Dublin
    image: lscr.io/linuxserver/ombi:latest
    networks:
      - media_network
    ports:
      - '3579:3579'
    restart: unless-stopped
    volumes:
      - ${DATA_LOCATION}/ombi/config:/config
  immich-server:
    container_name: immich_server
    depends_on:
      - redis
      - database
    environment:
      DB_DATABASE_NAME: immich
      DB_HOSTNAME: immich_postgres
      DB_PASSWORD: ${DB_PASSWORD}
      DB_USERNAME: ${DB_USERNAME}
      TZ: Europe/Dublin
      UPLOAD_LOCATION: ${DATA_LOCATION}/immich/
    image: ghcr.io/immich-app/immich-server:release
    networks:
      - media_network
    ports:
      - '2283:2283'
    restart: unless-stopped
    volumes:
      - ${DATA_LOCATION}/immich:/usr/src/app/upload
  immich-machine-learning:
    container_name: immich-machine-learning
    image: ghcr.io/immich-app/immich-machine-learning:release
    networks:
      - media_network
    restart: unless-stopped
    volumes:
      - model-cache:/cache
  redis:
    container_name: immich_redis
    image: redis:6.2-alpine
    networks:
      - media_network
    restart: unless-stopped
  database:
    container_name: immich_postgres
    environment:
      POSTGRES_DB: ${DB_DATABASE_NAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME}
      TZ: Europe/Dublin
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0
    networks:
      - media_network
    shm_size: 128mb
    restart: unless-stopped
    volumes:
      - ${DATA_LOCATION}/immich/pg_database:/var/lib/postgresql/data
  watchtower:
    container_name: watchtower
    image: containrrr/watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_SCHEDULE=0 0 4 * * *
      - WATCHTOWER_TIMEOUT=30s
      - WATCHTOWER_ROLLING_RESTART=true
    restart: unless-stopped
    networks:
      - media_network
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: unless-stopped
    environment:
      DOMAIN: "https://vw.jasonntmk.com"
    volumes:
      - ${DATA_LOCATION}/vaultwarden:/data/
    ports:
      - '7456:80'
  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_VULKAN=1
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - ${DATA_LOCATION}/ollama:/root/.ollama
    restart: unless-stopped
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    ports:
      - "3000:8080"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - ${DATA_LOCATION}/open-webui:/app/backend/data
    restart: unless-stopped
  gitlab:
    image: gitlab/gitlab-ce:latest
    container_name: gitlab
    hostname: gitlab.jasonntmk.com
    restart: unless-stopped
    networks:
      - media_network
    ports:
      - '8929:80'
      - '2223:22'
      - '5050:5050'
    environment:
      TZ: Europe/Dublin
      GITLAB_OMNIBUS_CONFIG: |
        external_url 'https://gitlab.jasonntmk.com'
        nginx['listen_port'] = 80
        nginx['listen_https'] = false
        gitlab_rails['gitlab_shell_ssh_port'] = 2223
        registry_external_url 'https://registry.jasonntmk.com'
        gitlab_rails['registry_enabled'] = true
        registry_nginx['listen_port'] = 5050
        registry_nginx['listen_https'] = false
        puma['worker_processes'] = 4
    volumes:
      - ${DATA_LOCATION}/gitlab/config:/etc/gitlab
      - ${DATA_LOCATION}/gitlab/data:/var/opt/gitlab
      - ${CACHE_LOCATION}/gitlab/logs:/var/log/gitlab
      - ${CACHE_LOCATION}/gitlab/tmp:/var/opt/gitlab/gitlab-rails/tmp
      - ${CACHE_LOCATION}/gitlab/shared-cache:/var/opt/gitlab/gitlab-rails/shared/cache
      - ${CACHE_LOCATION}/gitlab/ci-builds:/var/opt/gitlab/gitlab-ci/builds
      - ${CACHE_LOCATION}/gitlab/prometheus:/var/opt/gitlab/prometheus
    shm_size: '256m'
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
  gitlab-runner:
    image: gitlab/gitlab-runner:latest
    container_name: gitlab-runner
    depends_on:
      - gitlab
    restart: unless-stopped
    networks:
      - media_network
    environment:
      TZ: Europe/Dublin
    volumes:
      - ${DATA_LOCATION}/gitlab-runner/config:/etc/gitlab-runner
      - ${CACHE_LOCATION}/gitlab-runner:/cache
      - /var/run/docker.sock:/var/run/docker.sock
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
  wyoming-whisper:
    build: https://github.com/JOG-NTMK/wyoming-faster-whisper-rocm-docker.git
    container_name: wyoming-faster-whisper-rocm
    restart: unless-stopped
    devices:
      - /dev/kfd
      - /dev/dri
    group_add:
      - video
    security_opt:
      - seccomp=unconfined
    ipc: host
    shm_size: "8gb"
    ports:
      - "10300:10300"
    volumes:
      - ./data:/data
    command:
      - --model=medium.en
      - --language=en
      - --beam-size="3"
volumes:
  model-cache: null
  ollama:
  open-webui: